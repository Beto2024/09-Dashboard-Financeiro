{% extends "base.html" %}

{% block title %}Editar Transação — FinDash{% endblock %}

{% block content %}
<div class="page-header mb-4">
    <div class="d-flex align-items-center gap-3">
        <a href="{{ url_for('transactions.index') }}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i>
        </a>
        <div>
            <h4 class="mb-1"><i class="bi bi-pencil me-2 text-primary"></i>Editar Transação</h4>
            <p class="text-muted mb-0">Atualize os dados da transação</p>
        </div>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-12 col-md-6">
        <div class="card card-dark">
            <div class="card-body">
                <form method="POST" action="{{ url_for('transactions.edit', transaction_id=transaction.id) }}">
                    <div class="mb-3">
                        <label class="form-label">Descrição <span class="text-danger">*</span></label>
                        <input type="text" name="description" class="form-control bg-dark text-light border-secondary"
                               value="{{ transaction.description }}" required>
                    </div>
                    <div class="row g-3">
                        <div class="col-6">
                            <label class="form-label">Valor (R$) <span class="text-danger">*</span></label>
                            <input type="number" name="amount" class="form-control bg-dark text-light border-secondary"
                                   step="0.01" min="0.01" value="{{ transaction.amount }}" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label">Data <span class="text-danger">*</span></label>
                            <input type="date" name="date" class="form-control bg-dark text-light border-secondary"
                                   value="{{ transaction.date.strftime('%Y-%m-%d') }}" required>
                        </div>
                    </div>
                    <div class="row g-3 mt-0">
                        <div class="col-6">
                            <label class="form-label">Tipo <span class="text-danger">*</span></label>
                            <select name="type" class="form-select bg-dark text-light border-secondary" required>
                                {% for t in types %}
                                <option value="{{ t }}" {% if t == transaction.type %}selected{% endif %}>{{ t }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="form-label">Categoria <span class="text-danger">*</span></label>
                            <select name="category" class="form-select bg-dark text-light border-secondary" required>
                                {% for cat in categories %}
                                <option value="{{ cat }}" {% if cat == transaction.category %}selected{% endif %}>{{ cat }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle me-1"></i>Atualizar
                        </button>
                        <a href="{{ url_for('transactions.index') }}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
